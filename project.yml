name: CodingQuotaBar
options:
  bundleIdPrefix: top.kyatai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

schemes:
  CodingQuotaBarWatch:
    build:
      targets:
        CodingQuotaBarWatch: all
    run:
      executable: CodingQuotaBarWatch

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  CodingQuotaBar:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - CodingQuotaBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.kyatai.codingquotabar
        INFOPLIST_FILE: CodingQuotaBar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: YK3B68GL75
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: CodingQuotaBarWidget
      - target: CodingQuotaBarWatch
        embed: true
        link: false
    entitlements:
      path: CodingQuotaBar/CodingQuotaBar.entitlements
      properties:
        com.apple.security.application-groups:
          - group.top.kyatai.codingquotabar

  CodingQuotaBarWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - CodingQuotaBarWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.kyatai.codingquotabar.watchapp
        INFOPLIST_FILE: CodingQuotaBarWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: YK3B68GL75
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: false
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks @executable_path/../../../Frameworks"
    entitlements:
      path: CodingQuotaBarWatch/CodingQuotaBarWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.top.kyatai.codingquotabar

  CodingQuotaBarWidget:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - CodingQuotaBarWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.kyatai.codingquotabar.widget
        INFOPLIST_FILE: CodingQuotaBarWidget/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: false
        APPLICATION_EXTENSION_API_ONLY: YES
    entitlements:
      path: CodingQuotaBarWidget/CodingQuotaBarWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.top.kyatai.codingquotabar
